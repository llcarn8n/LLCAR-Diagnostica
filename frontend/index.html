<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>LLCAR Diagnostica</title>
  <link rel="stylesheet" href="css/diagnostica.css">
  <script type="importmap">
  {
    "imports": {
      "three": "../../node_modules/three/build/three.module.js",
      "three/addons/": "../../node_modules/three/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app" class="app">
    <!-- Status Bar -->
    <div class="status-bar" id="status-bar">
      <span class="status-bar__time" data-i18n="status.time">9:41</span>
      <div class="status-bar__icons">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h.01"/><path d="M7 20v-4"/><path d="M12 20v-8"/><path d="M17 20V8"/></svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h.01"/><path d="M2 8.82a15 15 0 0 1 20 0"/><path d="M5 12.859a10 10 0 0 1 14 0"/><path d="M8.5 16.429a5 5 0 0 1 7 0"/></svg>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></svg>
      </div>
    </div>

    <!-- Screens -->
    <div id="screen-onboarding" class="screen screen--active"></div>
    <div id="screen-dashboard" class="screen"></div>
    <div id="screen-diagnostics" class="screen"></div>
    <div id="screen-twin" class="screen"></div>
    <div id="screen-certificate" class="screen"></div>
    <div id="screen-knowledge" class="screen"></div>
    <div id="screen-knowledge-v2" class="screen"></div>
    <div id="screen-doctor" class="screen"></div>
    <div id="screen-scraping" class="screen"></div>

    <!-- Tab Bar -->
    <div class="tab-bar" id="tab-bar" style="display: none;">
      <div class="tab-bar__container">
        <button class="tab-bar__item" data-tab="health">
          <svg class="tab-bar__item-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/></svg>
          <span class="tab-bar__item-label" data-i18n="tabs.health">&#1047;&#1044;&#1054;&#1056;&#1054;&#1042;&#1068;&#1045;</span>
        </button>
        <button class="tab-bar__item" data-tab="diagnostics">
          <svg class="tab-bar__item-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 2v2"/><path d="M5 2v2"/><path d="M5 3H4a2 2 0 0 0-2 2v4a6 6 0 0 0 12 0V5a2 2 0 0 0-2-2h-1"/><path d="M8 15a6 6 0 0 0 12 0v-3"/><path d="M11 3v6"/><path d="M6 3v6"/><circle cx="20" cy="10" r="2"/></svg>
          <span class="tab-bar__item-label" data-i18n="tabs.diagnostics">&#1040;&#1053;&#1040;&#1051;&#1048;&#1047;&#1067;</span>
        </button>
        <button class="tab-bar__item" data-tab="twin">
          <svg class="tab-bar__item-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.466 7.5C15.643 4.237 13.952 2 12 2 9.239 2 7 6.477 7 12s2.239 10 5 10c1.952 0 3.643-2.237 4.466-5.5"/><path d="M3 12h18"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10"/></svg>
          <span class="tab-bar__item-label" data-i18n="tabs.twin">3D</span>
        </button>
        <button class="tab-bar__item" data-tab="knowledge">
          <svg class="tab-bar__item-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
          <span class="tab-bar__item-label" data-i18n="tabs.knowledge">&#1047;&#1053;&#1040;&#1053;&#1048;&#1071;</span>
        </button>
        <button class="tab-bar__item" data-tab="doctor">
          <svg class="tab-bar__item-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
          <span class="tab-bar__item-label" data-i18n="tabs.doctor">&#1044;&#1054;&#1050;&#1058;&#1054;&#1056;</span>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
